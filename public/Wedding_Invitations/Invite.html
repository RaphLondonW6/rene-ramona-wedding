<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rene &amp; Ramona — Wedding Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #b8935a;
      --gold-light: #d4af7a;
      --gold-pale: #e8d5b0;
      --cream: #fbf8f2;
      --ivory: #f5f0e8;
      --dark: #2c2416;
      --text: #3d2f1a;
      --text-light: #7a6545;
    }

    body {
      background: var(--ivory);
      min-height: 100vh;
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    /* ── UI Bar ── */
    .ui-bar {
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .btn-pdf {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold-pale);
      background: transparent;
      padding: 7px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-pdf:hover { background: var(--gold-pale); color: var(--dark); }
    .lang-toggle {
      display: flex;
      border: 1px solid var(--gold-pale);
    }
    .lang-toggle button {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      background: transparent;
      border: none;
      border-right: 1px solid var(--gold-pale);
      color: var(--text-light);
      padding: 7px 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-toggle button:last-child { border-right: none; }
    .lang-toggle button.active { background: var(--gold); color: #fff; }

    /* ── Outer Card ── */
    .card-outer {
      width: 100%;
      max-width: 560px;
      background-color: var(--cream);
      background-image: url('./Gemini_Generated_Image_u6ogjtu6ogjtu6og.png');
      background-size: cover;
      background-position: center top;
      position: relative;
      overflow: hidden;
      box-shadow: 0 12px 60px rgba(90,60,20,0.15), 0 2px 10px rgba(90,60,20,0.08);
    }
    /* soft cream wash so floral reads as elegant, not overwhelming */
    .card-outer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(253, 248, 242, 0.42);
      z-index: 1;
      pointer-events: none;
    }
    /* thin gold line border */
    .card-outer::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1px solid var(--gold-light);
      pointer-events: none;
      z-index: 4;
    }

    /* ── Inner content ── */
    .card-inner {
      position: relative;
      z-index: 2;
      padding: 50px 80px 46px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    @media (max-width: 480px) {
      .card-inner { padding: 38px 50px 38px; }
    }
    @media (max-width: 360px) {
      .card-inner { padding: 32px 32px 32px; }
    }

    /* ── Monogram ── */
    .monogram-oval {
      width: 64px; height: 78px;
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 26px;
      background: var(--cream);
    }
    .monogram-oval span {
      font-family: 'Great Vibes', cursive;
      font-size: 30px; color: var(--gold);
      letter-spacing: -2px; line-height: 1;
    }

    /* ── Arch frame ── */
    .arch-frame {
      width: 100%;
      border: 1px solid var(--gold-pale);
      border-radius: 100px 100px 4px 4px;
      padding: 34px 28px 30px;
      background: rgba(253, 248, 242, 0.94);
    }
    @media (max-width: 480px) {
      .arch-frame { border-radius: 70px 70px 4px 4px; padding: 26px 16px 24px; }
    }

    /* ── Typography ── */
    .label-upper {
      font-family: 'Cinzel', serif;
      font-size: 9px; letter-spacing: 0.28em;
      color: var(--text-light); text-transform: uppercase;
      margin-bottom: 10px; display: block;
    }
    .names-script {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(36px, 7.5vw, 52px);
      color: var(--gold); line-height: 1.1;
      margin-bottom: 18px; display: block;
    }
    .couple-script {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(32px, 7vw, 48px);
      color: var(--gold); line-height: 1.1;
      margin-bottom: 20px; display: block;
    }
    .divider {
      width: 100%; display: flex; align-items: center; gap: 8px;
      margin: 12px 0;
    }
    .divider-line { flex: 1; height: 1px; background: var(--gold-pale); }
    .divider-diamond {
      width: 4px; height: 4px;
      background: var(--gold-light); transform: rotate(45deg);
    }
    .tagline {
      font-family: 'Cinzel', serif;
      font-size: 8.5px; letter-spacing: 0.22em;
      color: var(--text-light); text-transform: uppercase;
      line-height: 1.9; margin-bottom: 20px; display: block;
    }
    .day-label {
      font-family: 'Cinzel', serif;
      font-size: 11px; letter-spacing: 0.28em;
      color: var(--text-light); text-transform: uppercase;
      margin-bottom: 8px; display: block;
    }
    .date-row {
      font-family: 'Cinzel', serif;
      font-size: 12px; letter-spacing: 0.26em; color: var(--text);
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 16px;
    }
    .date-row .pipe { color: var(--gold-light); font-weight: 300; }
    .time-venue {
      font-family: 'Cinzel', serif;
      font-size: 9px; letter-spacing: 0.2em;
      color: var(--text-light); text-transform: uppercase;
      line-height: 2; display: block;
    }
    .venue-address {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 12px;
      color: var(--text-light); line-height: 1.6;
      margin-top: 4px; display: block;
    }

    /* ── RSVP ── */
    .rsvp-section {
      margin-top: 30px; width: 100%; text-align: center;
      background: rgba(253, 248, 242, 0.94);
      padding: 20px 16px 4px;
    }
    .rsvp-title {
      font-family: 'Cinzel', serif;
      font-size: 10px; letter-spacing: 0.32em;
      color: var(--text-light); text-transform: uppercase;
      margin-bottom: 12px; display: block;
    }
    .qr-wrap {
      display: inline-block;
      border: 1px solid var(--gold-pale);
      padding: 8px; background: #fff;
    }
    .qr-wrap img { display: block; }
    .rsvp-url {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; letter-spacing: 0.1em;
      color: var(--text-light); margin-top: 8px; display: block;
    }

    /* ── Print ── */
    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      body { background: #fff; padding: 0; }
      .ui-bar { display: none !important; }
      .card-outer {
        box-shadow: none;
        max-width: 148mm;
        margin: 10mm auto;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }
  </style>
</head>

        day: 'Sobota', month: 'Júna', atTime: 'O 16:00', rsvpLabel: 'RSVP',

    };

    function setLang(lang) {
      const t = i18n[lang];
      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.dataset.key;
        if (t[key] !== undefined) el.innerHTML = t[key];
      });
      ['en','ro','sk'].forEach(l =>
        document.getElementById('btn-' + l).classList.toggle('active', l === lang)
      );
      document.documentElement.lang = lang;
    }
